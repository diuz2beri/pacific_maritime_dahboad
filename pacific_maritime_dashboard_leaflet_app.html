							<head>
<meta charset="UTF-8">
<title>Pacific Maritime Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
body { margin:0; font-family:Arial; display:flex; }
#sidebar { width:340px; background:#0f172a; color:white; padding:15px; height:100vh; overflow:auto; }
#map { flex:1; height:100vh; }
input, select { width:100%; padding:8px; margin-top:10px; }
button { width:100%; padding:10px; margin-top:10px; background:#00aaff; color:white; border:none; }
.label { color:white; font-size:12px; text-shadow:0 0 3px black; }
</style>
</head>
<body>

<div id="sidebar">
<h2>Pacific Dashboard</h2>

<input type="file" id="fileInput" multiple="" accept=".geojson,.json">

<select id="countryFilter">
<option value="">Filter by Country</option>
</select>

<input type="text" id="searchBox" placeholder="Search country...">

<button id="downloadBtn" style="display:none;">Download</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([-15,170],4);

const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

osm.addTo(map);

const baseMaps = {"Map":osm,"Satellite":satellite};
const overlayMaps = {};
const layerControl = L.control.layers(baseMaps, overlayMaps).addTo(map);

let layers = [];
let selectedFeature = null;
let countries = new Set();

function onEachFeature(feature, layer){
  const name = feature.properties?.name || "Unknown";
  const country = feature.properties?.country || "Unknown";

  countries.add(country);

  layer.bindTooltip(name,{permanent:false});

  // LABEL
  const center = layer.getBounds().getCenter();
  L.marker(center,{
    icon:L.divIcon({className:'label',html:name})
  }).addTo(map);

  layer.on('click',()=>{
    selectedFeature = feature;
    document.getElementById('downloadBtn').style.display='block';
  });
}

// MULTI FILE LOAD
document.getElementById('fileInput').addEventListener('change',function(e){
  [...e.target.files].forEach(file=>{
    const reader = new FileReader();
    reader.onload = function(evt){
      const data = JSON.parse(evt.target.result);

      const layer = L.geoJSON(data,{onEachFeature}).addTo(map);
      layers.push(layer);

      layerControl.addOverlay(layer,file.name);
      map.fitBounds(layer.getBounds());

      updateCountryFilter();
    };
    reader.readAsText(file);
  });
});

// SEARCH
 document.getElementById('searchBox').addEventListener('input',function(){
  const val = this.value.toLowerCase();

  layers.forEach(layer=>{
    layer.eachLayer(l=>{
      const name = l.feature.properties?.name?.toLowerCase()||"";
      if(name.includes(val)){
        map.fitBounds(l.getBounds());
      }
    });
  });
});

// FILTER
function updateCountryFilter(){
  const select = document.getElementById('countryFilter');
  select.innerHTML = '<option value="">Filter by Country</option>';
  countries.forEach(c=>{
    const opt=document.createElement('option');
    opt.value=c; opt.text=c;
    select.appendChild(opt);
  });
}

 document.getElementById('countryFilter').addEventListener('change',function(){
  const val = this.value;

  layers.forEach(layer=>{
    layer.eachLayer(l=>{
      const country = l.feature.properties?.country;
      if(!val || country===val){
        l.addTo(map);
      } else {
        map.removeLayer(l);
      }
    });
  });
});

// DOWNLOAD
 document.getElementById('downloadBtn').onclick=function(){
  if(!selectedFeature) return;
  const dataStr="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(selectedFeature));
  const link=document.createElement('a');
  link.href=dataStr;
  link.download="EEZ.geojson";
  link.click();
 };

</script>



</body></html>
